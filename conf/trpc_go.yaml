# trpc-go 服务配置
# 文档: https://github.com/trpc-group/trpc-go

global:
  namespace: development
  env_name: development
  container_name: qq-ai-trpg-bot
  enable_set: false
  full_link_name: qq_ai_trpg_bot

server:
  app: qq_ai_trpg_bot
  server: bot
  bin_path: ./bin/
  conf_path: ./conf/
  filter:
    - recovery    # panic 恢复
    - metrics     # 指标监控

# QQ 机器人配置 (官方 API v2)
# 文档: https://bot.q.qq.com/wiki/develop/api-v2/
qq_bot:
  # 凭证配置（建议通过环境变量设置）
  app_id: "102079108"                  # 机器人 AppID，也可通过环境变量 QQ_BOT_APPID 设置
  client_secret: "Ym0FVl2KcvFZuGczMk9YyOpHjCf9e9fB"           # 机器人 ClientSecret，也可通过环境变量 QQ_BOT_SECRET 设置
  # OpenAPI 基础地址
  api_base_url: "https://api.sgroup.qq.com"
  # 事件订阅
  intents:
    - group_and_c2c_event     # 群聊和单聊事件 (1<<25)
    - interaction             # 交互事件 (1<<26)
    - public_guild_messages   # 公域频道消息 (1<<30)
  # WebSocket 重连配置
  reconnect_interval: 3s      # 重连间隔
  heartbeat_timeout: 45s     # 心跳超时

# AI Agent 配置 (trpc-agent-go + DeepSeek)
agent:
  # LLM 模型配置
  llm:
    provider: deepseek          # 支持: deepseek / openai
    model: deepseek-v4-flash        # DeepSeek 模型: deepseek-v4-flash / deepseek-v4-pro
    api_key: ""               # 请通过环境变量 LLM_API_KEY 设置
    base_url: "https://api.deepseek.com"  # DeepSeek API 地址
    max_tokens: 4096
    temperature: 0.8
  # Agent 行为配置
  behavior:
    max_turns: 50             # 单次会话最大轮次
    memory_window: 20         # 上下文记忆窗口大小
    enable_tools: true        # 启用工具调用
  # Agent 人设 (KP/DM 主持人)
  system_prompt: |
    你是一个经验丰富的 TRPG 游戏主持人（KP/DM）。
    你负责引导玩家进行桌面角色扮演游戏，包括：
    1. 描述场景和氛围
    2. 扮演 NPC
    3. 根据玩家行动推进剧情
    4. 在需要时要求玩家进行骰点判定
    请保持沉浸感和趣味性，尊重玩家的选择。

# TRPG 游戏引擎配置
trpg:
  default_ruleset: coc7        # 默认规则集: coc7 / dnd5e
  enable_dice_log: true
  character_dir: ./data/characters    # 角色卡存储目录
  module_dir: ./data/modules          # 模组存储目录
  script_dir: ./data/scripts          # 剧本存档目录
  progress_dir: ./data/scripts/progress  # 进度存档目录

# 剧本识别 Agent 配置
script:
  analyzer:
    temperature: 0.3              # 识别温度（低温保证一致性）
    max_tokens: 8192              # 最大 token 数

# OpenViking 上下文数据库配置
# 本地部署: http://localhost:1933
# 云上版本: 火山引擎 OpenViking endpoint（见 https://www.volcengine.com/docs/84313/2381937）
openviking:
  enabled: false                  # 是否启用 OpenViking
  base_url: "http://localhost:1933"  # OpenViking 服务地址
  api_key: ""                     # API Key（云上版本必填，本地可选）
  account: ""                     # 多租户账号（可选）
  user: ""                        # 多租户用户（可选）
  timeout: 10                     # HTTP 超时（秒）

# 时间轴推进引擎配置
timeline:
  idle_interval: 15               # 无进展定时器间隔（分钟）
  max_idle_count: 3               # 最大无进展次数后触发提示

# 数据存储配置
storage:
  type: sqlite                 # 支持: sqlite / mysql
  sqlite:
    path: ./data/bot.db
  mysql:
    dsn: "root:password@tcp(127.0.0.1:3306)/trpg_bot?charset=utf8mb4&parseTime=True"

# 日志配置
log:
  level: debug                 # trace / debug / info / warn / error
  output: ["console", "file"]
  file:
    path: ./logs/
    filename: bot.log
    max_size: 100              # MB
    max_backups: 10
    max_age: 30                # 天
